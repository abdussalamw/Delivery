version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery_php
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/html/
    environment:
      - DB_HOST=db
      - DB_NAME=delivery_db
      - DB_USER=${DB_USER:-delivery_user}
      - DB_PASS=${DB_PASS:-Delivery@2026}
      # Evolution API
      - EVO_URL=http://evolution:8080
      - EVO_KEY=${EVO_KEY:-dlv-evo-K9x2mP8nQ4rT7wJ3vL5}
      - EVO_INSTANCE=${EVO_INSTANCE:-delivery}
    depends_on:
      - db
      - evolution

  db:
    image: postgres:16-alpine
    container_name: delivery_db_container
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=delivery_db
      - POSTGRES_USER=${DB_USER:-delivery_user}
      - POSTGRES_PASSWORD=${DB_PASS:-Delivery@2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./delivery_system_schema.sql:/docker-entrypoint-initdb.d/init.sql

  evolution:
    image: atendai/evolution-api:latest
    container_name: delivery_evolution
    ports:
      - "8088:8080"
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVO_KEY:-dlv-evo-K9x2mP8nQ4rT7wJ3vL5}
      - QRCODE_LIMIT=30
      - WEBHOOK_GLOBAL_ENABLED=false
      - DEL_INSTANCE=false
      - LOG_LEVEL=ERROR
      # Database — PostgreSQL
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DB_USER:-delivery_user}:${DB_PASS:-Delivery@2026}@db:5432/evolution_db
      # Cache — Local (لتبسيط العمل على السيرفر وتجنب مشاكل الربط)
      - CACHE_PROVIDER=local
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  evolution_store:
  evolution_instances:
