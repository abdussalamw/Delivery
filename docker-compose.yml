version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: delivery_php
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html/
    environment:
      - DB_HOST=db
      - DB_NAME=delivery_db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-123456}
      - BOT_HOST=bot
      - BOT_URL=http://bot:3000
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: delivery_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=delivery_db
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-123456}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # سيقوم Docker تلقائياً بإنشاء الجداول والبيانات التجريبية عند أول تشغيل للقاعدة
      - ./delivery_system_schema.sql:/docker-entrypoint-initdb.d/init.sql

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: delivery_bot
    ports:
      - "3000:3000"
    volumes:
      - ./bot:/app
      - /app/node_modules # لتجاهل تركيب مجلد local
    environment:
      - WEBHOOK_URL=http://web/webhook_handler.php
    restart: unless-stopped
    depends_on:
      - web

volumes:
  pgdata:
